<!DOCTYPE html>
<html>

<head>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        poppins: ["Poppins"],
                    },
                },
            },
        };
    </script>
</head>

<body class="font-poppins m-0">

    
    <div id="bgContainer" class="min-h-screen px-2 md:px-6 lg:px-10">

        
        <h1 class="text-center text-xl md:text-2xl lg:text-3xl font-semibold text-white mt-4 mb-2">
            MEET OUR CHATBOT 🤖
        </h1>

        <img 
          src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png" 
          class="w-24 md:w-32 lg:w-36 mx-auto mb-3"
        />

        
        <div id="chatContainer" 
             class="bg-white/20 backdrop-blur-md rounded-xl 
                    h-[60vh] md:h-[65vh] lg:h-[70vh] 
                    overflow-y-auto p-3 md:p-4 shadow-lg mb-20">

        </div>

       
        <div class="fixed w-full px-2 mb-2 md:px-6 lg:px-10 pb-3">
            
            <div class="max-w-md md:max-w-xl lg:max-w-2xl mx-auto flex gap-2">
                
                <input 
                    id="userInput" 
                    placeholder="Type a message..."
                    class="bg-white text-gray-800 h-12 rounded-full px-4 w-full shadow-md outline-none text-sm md:text-base"
                />
                
                <button 
                    class="bg-gray-900 hover:bg-gray-800 text-white rounded-full px-4 md:px-5 h-12 shadow-md transition"
                    onclick="sendMsgToChatbot()">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>

            </div>
        </div>

    </div>

<script>
let chatbotMsgList = [
    "Hi 👋",
    "Hey!",
    "Good Morning ☀️",
    "Good Evening 🌙",
    "How can I help you?",
    "My name is JARVIS",
    "Nice to meet you!",
    "Tell me more 😄"
];

let chatContainer = document.getElementById("chatContainer");
let userInput = document.getElementById("userInput");
let bgContainer = document.getElementById("bgContainer");



bgContainer.style.backgroundImage =
"linear-gradient(135deg, #141e30, #243b55)";
bgContainer.style.backgroundSize = "cover";


userInput.addEventListener("keydown", function(event){
    if(event.key === "Enter"){
        sendMsgToChatbot();
    }
});

function sendMsgToChatbot(){
    let userMsg = userInput.value.trim();
    if(userMsg === "") return;

 
    let msgContainer = document.createElement("div");
    msgContainer.classList.add("text-right","my-2");

    let actualMsg = document.createElement("span");
    actualMsg.textContent = userMsg;
    actualMsg.classList.add(
        "inline-block","rounded-xl","p-3",
        "bg-blue-500","text-white",
        "max-w-[75%]"
    );

    msgContainer.appendChild(actualMsg);
    chatContainer.appendChild(msgContainer);

    userInput.value = "";

    chatContainer.scrollTop = chatContainer.scrollHeight;

    setTimeout(getReplyFromChatbot, 500);
}

function getReplyFromChatbot(){
    let botMsg = chatbotMsgList[Math.floor(Math.random()*chatbotMsgList.length)];

    let chatbotMsgContainer = document.createElement("div");
    chatbotMsgContainer.classList.add("my-2");

    let chatBotMsg = document.createElement("span");
    chatBotMsg.textContent = botMsg;
    chatBotMsg.classList.add(
        "inline-block","rounded-xl","p-3",
        "bg-gray-200","text-black",
        "max-w-[75%]"
    );

    chatbotMsgContainer.appendChild(chatBotMsg);
    chatContainer.appendChild(chatbotMsgContainer);

    chatContainer.scrollTop = chatContainer.scrollHeight;
}
</script>

</body>
</html>
